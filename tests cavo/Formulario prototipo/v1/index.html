<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Formulario Alumnos</title>
    </head>
    <body>
        <header>
            <h1>Formulario de Alumnos</h1>
            <p>Para subir al alumno a la base de datos debe completar esta formulario con la informacion del mismo.</p>
        </header>
        <main>
            <form method="POST" action="inserteurldedondesetienequemandarlainformacion">
                <fieldset>
                    <legend>Informacion Personal</legend>
                    <div>
                        <label for="Aname">Nombre:</label>
                        <input type="text" id="Aname" name="name" placeholder="Primer y segundo nombre" required>
                    </div>
                    <div>
                        <label for="Asname">Apellido:</label>
                        <input type="text" id="Asname" name="sname" placeholder="Primer y segundo apellido" required>
                    </div>
                    <div>
                        <label for="DNI">DNI:</label>
                        <input type="number" id="DNI" name="dni" placeholder="11111111" min="10000000" minlength="8" maxlenght="8" required>
                    </div>
                    <div>
                        <label for="age">Edad:</label>
                        <input type="number" id="age" name="dni" min="3" max="30" required>
                    </div>
                    <div>
                        <label for="masc">Genero: Masculino</label>
                        <input type="radio" id="masc" name="sex" value="masc">  <!-- NOW! -->
                        <label for="fem">Femenino</label>
                        <input type="radio" id="fem" name="sex" value="fem">
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Informacion de Contacto</legend>
                    <div>
                        <label for="phone">Telefono (sin el 11):</label>
                        <input type="number" id="phone" name="phon" placeholder="11111111" min="10000000" minlength="8" maxlenght="8" required>
                    </div>
                    <div>
                        <label for="escuela">Colegio:</label>
                        <select name="escuela" id="escuela">
                            <option>Colegio [inserte nombre]</option>
                            <!-- Las opciones se deben obtener de la tabla de colegios en la base de datos (o añadirlos manualmente, ew) -->
                        </select>
                    </div>
                    <div>
                        <label for="amail">Mail Institucional:</label>
                        <input type="text" id="amail" name="amail" placeholder="alumno@colegio.edu.ar" required>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Especializacion</legend>
                    <div>
                        <label for="especializacion">Tecnico/a en:</label>
                        <select name="especializacion" id="especializacion">
                            <option>[insertar especializacion]</option>
                            <!-- Igual que en el anterior select, las opciones las debe optener de la tabla de especializaciones (o ser añadidas manualmente) -->
                        </select>
                    </div>
                    <div>
                        <label for="pref">Preferencia:</label>
                        <select name="especializacion" id="especializacion">
                            <option>[insertar area de trabajor]</option>
                            <!-- habria que crear diferentes opciones basadas en areas de trabajo. Ej. software, hardware, mantenimiento, desarrollo web, programacion, diseño grafico, etc. -->
                        </select>
                    </div>
                </fieldset>
            </form>
        </main>
    </body>
</html>
